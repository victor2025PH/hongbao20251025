# Docker Compose v2 不再需要 version 字段
# TODO: 如果需要支持旧版 Docker Compose，可以保留 version，但会触发警告

x-common-env: &common-env
  env_file:
    - .env
  environment:
    # 强制使用共享 SQLite 数据库（开发环境）
    # 如果 .env 文件中有 DATABASE_URL，会被覆盖
    DATABASE_URL: sqlite:////app/data/data.sqlite
    FLAG_ENABLE_PUBLIC_GROUPS: ${FLAG_ENABLE_PUBLIC_GROUPS:-1}
    DEBUG: ${DEBUG:-true}
    TZ: ${TZ:-Asia/Manila}

services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: redpacket/backend:latest
    container_name: redpacket_bot
    restart: always
    <<: *common-env
    depends_on:
      db:
        condition: service_healthy
    command: python app.py
    volumes:
      - ./static:/app/static
      - ./exports:/app/exports
      - ./secrets:/app/secrets:ro
      - ./data:/app/data  # ✅ 共享数据目录（包含 SQLite 数据库文件）
    healthcheck:
      # 检查 Python 进程是否运行，并验证 aiogram 依赖是否可用
      test: ["CMD", "python", "-c", "import aiogram; import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - redpacket_network

  web_admin:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: redpacket/backend:latest
    container_name: redpacket_web_admin
    restart: always
    <<: *common-env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn web_admin.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - "0.0.0.0:8001:8001"  # 本地开发允许外部访问
    volumes:
      - ./static:/app/static
      - ./exports:/app/exports
      - ./templates:/app/templates:ro
      - ./secrets:/app/secrets:ro
      - ./data:/app/data  # ✅ 共享数据目录（包含 SQLite 数据库文件）
      - ./web_admin:/app/web_admin  # ✅ 挂载源代码目录，支持热重载
      - ./models:/app/models  # ✅ 挂载模型代码目录，支持热重载
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - redpacket_network

  miniapp_api:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: redpacket/backend:latest
    container_name: redpacket_miniapp_api
    restart: always
    <<: *common-env
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn miniapp.main:app --host 0.0.0.0 --port 8080 --reload
    ports:
      - "0.0.0.0:8080:8080"  # 本地开发允许外部访问
    volumes:
      - ./secrets:/app/secrets:ro
      - ./data:/app/data  # ✅ 共享数据目录（包含 SQLite 数据库文件）
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - redpacket_network

  db:
    image: postgres:15-alpine
    container_name: redpacket_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-redpacket}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-redpacket}
      POSTGRES_DB: ${POSTGRES_DB:-redpacket}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "127.0.0.1:15432:5432"  # 本地开发允许外部访问（避免与宿主机 PostgreSQL 端口冲突）
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - redpacket_network

  redis:
    image: redis:7.2-alpine
    container_name: redpacket_redis
    restart: always
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"
      else
        redis-server --appendonly yes
      fi
      "
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6380:6379"  # 本地开发允许外部访问（避免与宿主机 Redis 冲突）
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - redpacket_network

  # Next.js 前端控制台 (端口 3001)
  frontend:
    build:
      context: ./frontend-next
      dockerfile: Dockerfile
      args:
        # 构建时传入环境变量（本地开发使用 localhost）
        NEXT_PUBLIC_ADMIN_API_BASE_URL: ${NEXT_PUBLIC_ADMIN_API_BASE_URL:-http://localhost:8001}
        NEXT_PUBLIC_MINIAPP_API_BASE_URL: ${NEXT_PUBLIC_MINIAPP_API_BASE_URL:-http://localhost:8080}
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8001/api}
        NEXT_PUBLIC_DEFAULT_LANG: ${NEXT_PUBLIC_DEFAULT_LANG:-zh}
        NEXT_PUBLIC_ENABLE_DEVTOOLS: ${NEXT_PUBLIC_ENABLE_DEVTOOLS:-true}
        # Web Admin 登录凭据（用于自动登录，默认使用 admin/admin）
        NEXT_PUBLIC_ADMIN_WEB_USER: ${ADMIN_WEB_USER:-admin}
        NEXT_PUBLIC_ADMIN_WEB_PASSWORD: ${ADMIN_WEB_PASSWORD:-admin}
        NEXT_PUBLIC_ADMIN_TG_ID: ${ADMIN_TG_ID:-}
    image: redpacket/frontend:latest
    container_name: redpacket_frontend
    restart: always
    environment:
      NODE_ENV: development
      # 运行时环境变量（覆盖构建时的值）
      NEXT_PUBLIC_ADMIN_WEB_USER: ${ADMIN_WEB_USER:-admin}
      NEXT_PUBLIC_ADMIN_WEB_PASSWORD: ${ADMIN_WEB_PASSWORD:-admin}
      NEXT_PUBLIC_ADMIN_TG_ID: ${ADMIN_TG_ID:-}
    ports:
      - "0.0.0.0:3001:3001"  # 本地开发允许外部访问
    depends_on:
      - web_admin
      - miniapp_api
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - redpacket_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db_data:
    driver: local
  redis_data:
    driver: local

networks:
  redpacket_network:
    driver: bridge

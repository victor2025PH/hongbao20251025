welcome: "🎉 欢迎，{username}！请选择功能 👇"

welcome_full:
  title: "🎉 欢迎，{username}！"
  subtitle: |-
    🧧 <b>红包游戏简介</b>
    这里可以在群里/私聊发红包、抢红包、看排行与战绩。
    支持 USDT / TON / ⭐ 积分，多种玩法一键上手！
  howto:
    title: "🎮 玩法"
    steps: |-
      • 🧧 <b>发红包</b>：选择币种 → 总金额 → 份数 → 拼手气（随机）→ 发送。
      • 🤲 <b>抢红包</b>：点卡片上的【立即抢】，金额随机、拼手气！
      • 🏆 <b>看排行</b>：结束后可查看本轮“手气最佳”与记录。
      • 📊 <b>今日战绩</b>：统计当日抢到/发出额度与次数。
      • 💳 <b>充值/提现</b>：支持 USDT / TON，链上到账请耐心等待。
  rules:
    title: "📜 基本规则"
    points: |-
      • ⏱ 红包发出后在有效期内可抢，超时退回剩余金额。
      • 👤 每人每轮仅限抢一次，重复点击会提示已抢过。
      • 🧮 <b>拼手气 = 随机分配</b>，不等额；可能抢到最多，也可能为 0。
      • 🔄 支持转发本轮红包卡片（若开启且当前轮允许）。
      • 🧾 所有账变都会记录在“账变记录”中，便于核对。
  fair:
    title: "⚖️ 公平公正声明"
    points: |-
      • 🎲 随机引擎：基于高质量伪随机源（Python secrets/random），每份金额独立抽取上限并保证总和等于总金额，<b>不偏向任何用户</b>。
      • 🚫 反作弊：同一用户/设备仅记一次有效抢取；风控可拦截异常频率与脚本行为。
      • 💠 透明可追溯：每次发/抢都会记账（时间、金额、币种），异常可人工核查。
      • 📨 权限校验：仅在机器人有发送权限的群内投放，避免投递失败或串改。
      • 🛠 失败兜底：投递失败/快速失败会自动退款或提示重试，不吞款。
  cta: "🧭 现在就从菜单进入，试着发一个红包吧！"
  tip_open_menu: "👉 随时发送 /start 打开菜单。"


faq:
  send:
    title: "🧧 如何发红包"
    body: |-
      1. 打开菜单 → 发红包；
      2. 选择币种（USDT / TON / ⭐积分）、总额、份数；
      3. 选择投放位置（群内/私聊），补充祝福语（可跳过），确认发送；
      4. 如果投放到群，请确保机器人已在目标群且有发言权限。
  grab:
    title: "🤲 如何抢红包"
    body: |-
      1. 在群里看到红包卡片，点击【立即抢】；
      2. 金额为随机拼手气，系统会自动记账；
      3. 回合结束可在总结里查看“幸运之星”等信息。
  recharge:
    title: "💳 充值与提现"
    body: |-
      · 进入“我的资产/充值/提现”向导，按提示完成；
      · 区块链网络需要确认时间，请耐心等待；
      · 如遇异常请联系管理员。
  rank:
    title: "🏆 排行/今日战绩"
    body: |-
      · 抢包回合结束后可以查看当轮排行与“幸运之星”；
      · 今日战绩入口可能根据版本开关显示与否。
  rules:
    title: "⚖️ 规则与公平性"
    body: |-
      · 仅拼手气随机分配；
      · 机器人不参与抢包；
      · 如需详细条款，请查看频道公告或联系管理员。

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - release/*
  pull_request:
    branches:
      - main
      - release/*

env:
  DOCKER_BUILDKIT: 1
  COMPOSE_DOCKER_CLI_BUILD: 1

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html requests urllib3
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Set up Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version
      
      - name: Create .env file for testing
        run: |
          cat > .env << EOF
          BOT_TOKEN=test_token
          ADMIN_IDS=123456
          POSTGRES_USER=redpacket
          POSTGRES_PASSWORD=test_password_123
          POSTGRES_DB=redpacket
          DATABASE_URL=sqlite:///./test.sqlite
          MINIAPP_JWT_SECRET=test_secret
          ADMIN_SESSION_SECRET=test_session_secret
          ADMIN_WEB_PASSWORD=test_password
          DEBUG=false
          NEXT_PUBLIC_ADMIN_API_BASE_URL=http://localhost:8000
          NEXT_PUBLIC_MINIAPP_API_BASE_URL=http://localhost:8080
          EOF
      
      - name: Build Docker images
        run: |
          docker-compose -f docker-compose.yml build --no-cache
      
      - name: Start services
        run: |
          docker-compose -f docker-compose.yml up -d
          docker-compose ps
      
      - name: Wait for services to be ready
        run: |
          echo "Waiting for services to be ready..."
          timeout=60
          elapsed=0
          while [ $elapsed -lt $timeout ]; do
            if curl -f http://localhost:8000/healthz && curl -f http://localhost:8080/healthz; then
              echo "Services are ready!"
              exit 0
            fi
            sleep 2
            elapsed=$((elapsed + 2))
            echo "Waiting... ($elapsed/$timeout seconds)"
          done
          echo "Services may not be fully ready"
      
      - name: Install PowerShell
        continue-on-error: true
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https software-properties-common
          wget -q https://packages.microsoft.com/config/ubuntu/20.04/packages-microsoft-prod.deb
          sudo dpkg -i packages-microsoft-prod.deb
          sudo apt-get update
          sudo apt-get install -y powershell
      
      - name: Run full stack tests
        shell: pwsh
        env:
          API_TEST_ADMIN_BASE_URL: http://localhost:8000
          API_TEST_MINIAPP_BASE_URL: http://localhost:8080
          API_TEST_FRONTEND_BASE_URL: http://localhost:3001
        continue-on-error: true
        run: |
          pwsh ./docs/api-testing/run-full-stack-tests.ps1 `
            -AdminBaseUrl "http://localhost:8000" `
            -MiniAppBaseUrl "http://localhost:8080" `
            -FrontendBaseUrl "http://localhost:3001" `
            -AllowFrontendFailure
      
      - name: Upload full stack test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-stack-test-report
          path: docs/api-testing/output/**
          retention-days: 30
      
      - name: Collect additional test reports
        if: always()
        run: |
          mkdir -p test-reports
          # Copy all test reports from the latest full-stack-test directory
          LATEST_DIR=$(ls -td docs/api-testing/output/full-stack-test-* 2>/dev/null | head -1)
          if [ -n "$LATEST_DIR" ]; then
            cp -r "$LATEST_DIR"/* test-reports/ || true
          else
            cp -r docs/api-testing/output/* test-reports/ || true
          fi
          docker-compose -f docker-compose.yml logs > test-reports/docker-logs.txt || true
      
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: test-reports/
          retention-days: 30
      
      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.yml down -v || true
  
  deploy-production:
    name: Deploy to Production
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    environment:
      name: production
      url: ${{ secrets.PROD_ADMIN_BASE_URL || 'http://165.154.233.55:8000' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Set up Docker Compose
        run: |
          sudo curl -L "https://github.com/docker/compose/releases/latest/download/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
      
      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      
      - name: Deploy to production server
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_PATH: ${{ secrets.PROD_PATH || '/opt/redpacket' }}
          API_TEST_ADMIN_BASE_URL: ${{ secrets.PROD_ADMIN_BASE_URL || 'http://165.154.233.55:8000' }}
          API_TEST_MINIAPP_BASE_URL: ${{ secrets.PROD_MINIAPP_BASE_URL || 'http://165.154.233.55:8080' }}
        run: |
          # SSH to production server and run deployment
          ssh -o StrictHostKeyChecking=no ${PROD_USER}@${PROD_HOST} << 'ENDSSH'
            set -e
            cd $PROD_PATH
            
            # Pull latest code
            git pull origin main || true
            
            # Run deployment script (if exists)
            if [ -f "docs/deployment/deploy-production.ps1" ]; then
              pwsh -File docs/deployment/deploy-production.ps1 \
                -SkipPull \
                -AdminBaseUrl "$API_TEST_ADMIN_BASE_URL" \
                -MiniAppBaseUrl "$API_TEST_MINIAPP_BASE_URL"
            else
              # Fallback to docker-compose
              docker-compose -f docker-compose.production.yml pull
              docker-compose -f docker-compose.production.yml up -d --build
            fi
          ENDSSH
      
      - name: Verify deployment
        env:
          API_TEST_ADMIN_BASE_URL: ${{ secrets.PROD_ADMIN_BASE_URL || 'http://165.154.233.55:8000' }}
          API_TEST_MINIAPP_BASE_URL: ${{ secrets.PROD_MINIAPP_BASE_URL || 'http://165.154.233.55:8080' }}
        run: |
          echo "Verifying deployment..."
          sleep 10
          
          # Test health endpoints
          curl -f $API_TEST_ADMIN_BASE_URL/healthz || exit 1
          curl -f $API_TEST_MINIAPP_BASE_URL/healthz || exit 1
          
          echo "✅ Deployment verified successfully!"

